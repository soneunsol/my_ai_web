<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Son Eun-sol</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 2.4rem;
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .role {
      font-size: 1.05rem;
      color: #a78bfa;
      margin-bottom: 32px;
      font-weight: 500;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .description {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .tag {
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.4);
      color: #a78bfa;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 28px;
      }

      .name {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👩‍💻</div>
    <h1 class="name">Son Eun-sol</h1>
    <p class="role">AI 바이브코딩 웹 강사</p>
    <div class="divider"></div>
    <p class="description">
      AI를 활용한 바이브코딩으로<br />
      누구나 웹을 만들 수 있도록 가르칩니다.
    </p>
    <div class="tags">
      <span class="tag">AI 코딩</span>
      <span class="tag">웹 개발</span>
      <span class="tag">React</span>
      <span class="tag">강의</span>
    </div>
  </div>
</body>
</html>
